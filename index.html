<!DOCTYPE html>
<html lang="ar" dir="ltr" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MR CAFE | منيو المشروبات</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@300;400;600;700&family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- LOADING SCREEN -->
  <div id="loading-screen">
    <div class="loading-content">
      <div class="steam-wrap">
        <svg class="steam-svg" viewBox="0 0 100 100">
          <path class="steam s1" d="M 30,100 C 20,80 40,60 30,40 C 20,20 40,0 30,-20" stroke="currentColor" stroke-width="4" stroke-linecap="round" fill="none"/>
          <path class="steam s2" d="M 50,100 C 60,80 40,60 50,40 C 60,20 40,0 50,-20" stroke="currentColor" stroke-width="5" stroke-linecap="round" fill="none"/>
          <path class="steam s3" d="M 70,100 C 60,80 80,60 70,40 C 60,20 80,0 70,-20" stroke="currentColor" stroke-width="3" stroke-linecap="round" fill="none"/>
        </svg>
      </div>
      <div class="loading-cup">
        <svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M8 20h40l-4 28H12L8 20z"/>
          <path d="M48 24h6a6 6 0 0 1 0 12h-6"/>
          <line x1="4" y1="20" x2="52" y2="20"/>
          <line x1="16" y1="14" x2="18" y2="20"/>
          <line x1="28" y1="12" x2="28" y2="20"/>
          <line x1="40" y1="14" x2="38" y2="20"/>
        </svg>
      </div>
      <h1 class="loading-title">MR CAFE</h1>
      <p class="loading-sub">جاري تحضير التجربة...</p>
    </div>
  </div>

  <!-- NAVBAR -->
  <nav id="navbar">
  <div class="nav-logo">
    <svg width="28" height="28" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M8 20h40l-4 28H12L8 20z"/><path d="M48 24h6a6 6 0 0 1 0 12h-6"/><line x1="4" y1="20" x2="52" y2="20"/>
    </svg>
    <span>MR CAFE</span>
  </div>
  
  <div style="display: flex; align-items: center; gap: 1rem;">
    <div id="cart-icon-wrap" style="position: relative; cursor: pointer;">
      <span style="font-size: 1.5rem;">🛒</span>
      <span id="cart-count">0</span>
    </div>

    <button id="theme-toggle" aria-label="Toggle theme">
      <span class="icon-sun">☀️</span>
      <span class="icon-moon">🌙</span>
    </button>
  </div>
</nav>


  <!-- HERO -->
  <section id="hero">
    <div class="hero-bg" id="hero-bg"></div>
    <div class="hero-overlay"></div>
    <div class="floating-bean bean-1">☕</div>
    <div class="floating-bean bean-2">🫘</div>
    <div class="hero-content" id="hero-content">
      <div class="hero-badge">PREMIUM EXPERIENCE</div>
      <h1 class="hero-title">MR CAFE</h1>
      <p class="hero-sub">اكتشف عالم المشروبات الفاخرة</p>
    </div>
    <div class="scroll-hint">
      <span>Scroll</span>
      <div class="scroll-arrow">&#8964;</div>
    </div>
  </section>

  <!-- MENU -->
  <section id="menu">
    <div class="section-header">
      <h2>قائمة المشروبات</h2>
      <div class="divider"></div>
    </div>
    <div class="filters" dir="rtl">
      <button class="filter-btn active" data-filter="all">الكل | All</button>
      <button class="filter-btn" data-filter="coffee">قهوة ☕ | Coffee</button>
      <button class="filter-btn" data-filter="cold">مشروبات باردة 🧃 | Cold</button>
      <button class="filter-btn" data-filter="smoothie">سموذي 🥤 | Smoothie</button>
      <button class="filter-btn" data-filter="tea">شاي 🍵 | Tea</button>
    </div>
    <div class="drinks-grid" id="drinks-grid"></div>
  </section>

  <!-- FOOTER -->
  <footer>
    <h2>MR CAFE</h2>
    <p>© <span id="year"></span> مستر كيف. جميع الحقوق محفوظة.</p>
  </footer>

  <!-- MODAL -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal-box">
      <img id="modal-img" src="" alt="" />
      <div class="modal-body" dir="rtl">
        <button class="modal-close" id="modal-close">✕</button>
        <h2 id="modal-name-ar"></h2>
        <p id="modal-name-en"></p>
        <div class="modal-price-box">
          <span id="modal-price"></span>
          <span class="modal-currency">ر.س</span>
        </div>
        <p id="modal-desc"></p>
        <div class="modal-ingredients">
          <h4>🌿 المكونات (Ingredients)</h4>
          <ul id="modal-ing-list"></ul>
        </div>
        <button class="order-btn" id="order-btn">🛍 أضف للطلب</button>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div id="toast" class="toast hidden"></div>

  <script src="script.js"></script>

  <div id="cart-modal-overlay" class="modal-overlay hidden">
  <div class="modal-box" style="max-width: 500px; flex-direction: column;">
    <div class="modal-body" dir="rtl" style="padding: 1.5rem;">
      <button class="modal-close" id="cart-modal-close">✕</button>
      <h2 style="font-family: 'Cairo', sans-serif; margin-bottom: 1rem; color: var(--text);">🛒 سلة طلباتك</h2>
      
      <div id="cart-items-list" style="max-height: 300px; overflow-y: auto; margin-bottom: 1rem; padding-left: 5px;">
        </div>

      <div style="border-top: 1px solid var(--border); padding-top: 1rem; margin-bottom: 1rem;">
        <div style="display: flex; justify-content: space-between; font-weight: bold; font-size: 1.2rem; color: var(--text);">
          <span>الإجمالي:</span>
          <span><span id="cart-total-price">0</span> ر.س</span>
        </div>
      </div>

      <button class="order-btn" id="checkout-whatsapp" style="background: #25D366; color: white;">
        إرسال الطلب عبر الواتساب 💬
      </button>
    </div>
  </div>
</div>

  
</body>
</html>
